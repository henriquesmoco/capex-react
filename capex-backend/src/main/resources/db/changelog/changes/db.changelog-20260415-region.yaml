databaseChangeLog:
  - changeSet:
      id: 20260415.1
      author: hsmoco
      changes:
        - createTable:
            tableName: tb_regions
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(20)
                  constraints:
                    nullable: false
  - changeSet:
      id: 20260415.2
      author: hsmoco
      changes:
        - createIndex:
            tableName: tb_regions
            indexName: idx_region_code
            columns:
              - column:
                  name: code
  - changeSet:
      id: 20260415.3
      author: hsmoco
      changes:
        - insert:
            tableName: tb_regions
            columns:
              - column:
                  name: id
                  value: "1"
              - column:
                  name: code
                  value: NA
        - insert:
            tableName: tb_regions
            columns:
              - column:
                    name: id
                    value: "2"
              - column:
                  name: code
                  value: CA
  - changeSet:
